<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>3-4岁幼儿潜力深度测评</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #FF7675; --secondary: #74B9FF; --success: #55E6C1; --bg: #FFFBFB; --text: #2D3436; --card-bg: rgba(255, 255, 255, 0.95); }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #FFF5F5 0%, #FFFBFB 100%); margin: 0; padding: 15px; color: var(--text); line-height: 1.6; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 99999; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
        .auth-box { background: white; padding: 40px 30px; border-radius: 30px; width: 88%; max-width: 340px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .auth-box input { width: 100%; padding: 15px; border: 2px solid #F1F1F1; border-radius: 15px; margin: 25px 0; font-size: 20px; text-align: center; outline: none; background: #FAFAFA; }
        .auth-box button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; }
        #main-content { display: none; max-width: 650px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 35px; box-shadow: 0 10px 50px rgba(255, 118, 117, 0.1); }
        header { text-align: center; margin-bottom: 35px; }
        h1 { color: var(--primary); margin: 0; font-size: 26px; font-weight: 800; }
        .subtitle { color: #A0A0A0; font-size: 14px; margin-top: 8px; }
        .question { margin-bottom: 25px; padding: 20px; border-radius: 20px; background: white; border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .options label { display: block; margin: 10px 0; padding: 14px 18px; border: 1.5px solid #F5F6FA; border-radius: 15px; background: #FFF; font-size: 14px; cursor: pointer; transition: all 0.25s ease; position: relative; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + span { color: var(--primary); font-weight: 600; }
        input[type="radio"]:checked + span::after { content: "✓"; position: absolute; right: 18px; font-weight: bold; }
        .btn-submit { width: 100%; padding: 20px; background: linear-gradient(135deg, #FF7675, #FF9F9E); color: white; border: none; border-radius: 20px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(255,118,117,0.3); }
        #report { display: none; margin-top: 40px; }
        .result-header { text-align: center; background: #FFF; padding: 30px 20px; border-radius: 25px; margin-bottom: 25px; border: 1px solid #FDECEC; }
        .chart-container { background: white; border-radius: 25px; padding: 20px; margin-bottom: 25px; border: 1px solid #F0F0F0; }
        .radar-box { height: 320px; width: 100%; }
        .bar-box { height: 380px; width: 100%; }
        .detail-card { background: white; padding: 25px; border-radius: 25px; border-left: 6px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .advice-box { background: #F8FBFF; padding: 15px; border-radius: 15px; border: 1px dashed var(--secondary); margin-top: 15px; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

<div id="auth-overlay">
    <div class="auth-box">
        <h2>测评验证</h2>
        <p style="color:#BBB; font-size:12px; margin-top:10px;">请输入授权码以开启测评</p>
        <input type="password" id="auth-input" placeholder="输入授权码" inputmode="numeric" autocomplete="off">
        <button id="auth-btn">立即开启</button>
    </div>
</div>

<div id="main-content">
    <header><h1>🌱 幼儿潜力深度测评</h1><div class="subtitle">耶鲁大学多维行为观察体系</div></header>
    <form id="quizForm"><div id="questions-container"></div></form>
    <button class="btn-submit" onclick="generateReport()">生成潜力报告</button>
    <div id="report">
        <div class="result-header"><span>核心潜力指向</span><h2 id="res-title"></h2></div>
        <div class="chart-container"><div class="radar-box"><canvas id="radarChart"></canvas></div></div>
        <div class="chart-container"><div class="bar-box"><canvas id="barChart"></canvas></div></div>
        <div class="detail-card"><h3 style="color:var(--primary);">✨ 深度信号解读</h3><p id="res-desc"></p>
            <div class="advice-box"><b style="color:var(--secondary)">💡 培养建议：</b><br><span id="res-advice"></span></div>
        </div>
    </div>
</div>

<script>
/**
 * 加固版
 */
(function() {
    
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
    
    
    setInterval(function() { (function(c) { (function(a) { if (a) { (function b() { }).constructor("debugger")(); } else { (function b() { }).constructor("debugger")(); } })(c); })(true); }, 2000);

    const _0x1a2b = ["MDUyMA==", "bGluZ3Vpc3RpYw==", "bG9naWNhbA==", "c3BhdGlhbA==", "bXVzaWNhbA==", "a2luZXN0aGV0aWM=", "aW50ZXJwZXJzb25hbA=="]; 
    const decode = (s) => atob(s);

    window.onload = function() {
        const authBtn = document.getElementById('auth-btn');
        authBtn.addEventListener('click', function() {
            if(document.getElementById('auth-input').value === decode(_0x1a2b[0])) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                renderQs();
            } else { alert("验证码无效"); }
        });
    };

    // 核心题库
    const qRaw = [
        ["当孩子想表达需求时，是否能自如更换词汇？", "经常如此", "偶尔变换", "直接指点", _0x1a2b[1], _0x1a2b[6], _0x1a2b[5]],
        ["孩子是否能迅速察觉大人细微的情绪波动？", "极其敏感", "会注意到", "不太关注", _0x1a2b[6], _0x1a2b[1], _0x1a2b[2]],
        ["是否喜欢将玩具按某种逻辑自发排序？", "经常如此", "偶尔模仿", "没兴趣", _0x1a2b[2], _0x1a2b[3], _0x1a2b[5]],
        ["听到陌生节奏，能否准确复刻拍打？", "几乎百分百", "模仿大概", "无明显兴趣", _0x1a2b[4], _0x1a2b[5], _0x1a2b[3]],
        ["在遮挡部分内容时，能否脑补物体全貌？", "空间感极佳", "需要提示", "关注细节", _0x1a2b[3], _0x1a2b[2], _0x1a2b[1]],
        ["学习平衡车等动作的协调速度如何？", "非常快", "反复练习", "倾向静坐", _0x1a2b[5], _0x1a2b[3], _0x1a2b[2]],
        ["是否经常自言自语编造故事剧本？", "经常如此", "模仿情节", "机械动作", _0x1a2b[1], _0x1a2b[6], _0x1a2b[5]],
        ["面对无法拆卸的玩具，是否研究其结构？", "研究因果", "求助暴力", "观察外观", _0x1a2b[2], _0x1a2b[6], _0x1a2b[3]],
        ["在陌生环境中，能否判断谁是‘小领袖’？", "洞察力强", "边缘观察", "完全不关注", _0x1a2b[6], _0x1a2b[1], _0x1a2b[2]],
        ["能否分辨两个极相近的声音差异？", "分辨力高", "分清明显差异", "不敏感", _0x1a2b[4], _0x1a2b[2], _0x1a2b[5]],
        ["在户外是否能记住回家的路或标志？", "路感极佳", "偶尔走错", "完全依赖", _0x1a2b[3], _0x1a2b[5], _0x1a2b[6]],
        ["对手部精细动作是否有持久耐心？", "掌控力强", "容易放弃", "喜欢大动作", _0x1a2b[5], _0x1a2b[2], _0x1a2b[5]],
        ["听到新词后能否立即活学活用？", "迁移力强", "需多次解释", "不感兴趣", _0x1a2b[1], _0x1a2b[6], _0x1a2b[4]],
        ["是否对‘为什么’背后的因果极度认真？", "穷追不舍", "随口一问", "动手改", _0x1a2b[2], _0x1a2b[1], _0x1a2b[5]],
        ["看绘本能否发现极其微小的逻辑错误？", "细节观察强", "看主线", "关注翻页", _0x1a2b[3], _0x1a2b[1], _0x1a2b[5]],
        ["面对小朋友哭泣能否主动安慰？", "主动解决", "冷漠观察", "跟着哭", _0x1a2b[6], _0x1a2b[2], _0x1a2b[4]],
        ["是否尝试在乐器上寻找听到的音阶？", "尝试欲望强", "乱敲", "听而不动", _0x1a2b[4], _0x1a2b[5], _0x1a2b[3]],
        ["是否表现出鞋头朝外等强迫秩序感？", "秩序感强", "被动接受", "无秩序感", _0x1a2b[2], _0x1a2b[6], _0x1a2b[3]],
        ["表达时是否善用形容词（巨大的等）？", "非常擅长", "简短直接", "手势代替", _0x1a2b[1], _0x1a2b[5], _0x1a2b[3]],
        ["玩拼图能否直接通过形状判断位置？", "直接判断", "不断试错", "没耐心", _0x1a2b[3], _0x1a2b[2], _0x1a2b[5]],
        ["运动中能否准确避开障碍物距离？", "预估准确", "经常撞到", "动作笨拙", _0x1a2b[5], _0x1a2b[3], _0x1a2b[2]],
        ["是否通过观察大人神色来决定表现？", "察言观色强", "沉浸自我", "吵闹关注", _0x1a2b[6], _0x1a2b[2], _0x1a2b[1]],
        ["是否会给玩偶起名并进行对话？", "起名对话", "简单玩耍", "拆卸研究", _0x1a2b[1], _0x1a2b[6], _0x1a2b[2]],
        ["听到不同情绪音乐是否产生对应反应？", "立刻反应", "只爱快节奏", "无反应", _0x1a2b[4], _0x1a2b[5], _0x1a2b[3]],
        ["是否对规则和公平性极其在意？", "非常在意", "争抢驱动", "听从安排", _0x1a2b[2], _0x1a2b[5], _0x1a2b[6]],
        ["能否模仿复杂表情并自如切换？", "切换自如", "模仿生硬", "不会模仿", _0x1a2b[5], _0x1a2b[6], _0x1a2b[3]],
        ["涂鸦或搭积木是否对对称性有偏好？", "明显偏好", "随意堆砌", "听指挥", _0x1a2b[3], _0x1a2b[5], _0x1a2b[6]],
        ["能否自发进行轮流等待或谈判？", "自主谈判", "直接争抢", "放弃", _0x1a2b[6], _0x1a2b[5], _0x1a2b[2]],
        ["能否通过局部特征认出卡通人物？", "快速识别", "需看全身", "无印象", _0x1a2b[3], _0x1a2b[1], _0x1a2b[2]],
        ["身体是否会不由自主随节拍律动？", "潜意识律动", "需提醒", "无节拍感", _0x1a2b[4], _0x1a2b[5], _0x1a2b[1]]
    ];

    function renderQs() {
        const c = document.getElementById('questions-container');
        qRaw.forEach((q, i) => {
            let d = document.createElement('div');
            d.className = 'question';
            d.innerHTML = `<p>${i+1}. ${q[0]}</p><div class="options">
                <label><input type="radio" name="q${i}" value="${decode(q[4])}"><span>${q[1]}</span></label>
                <label><input type="radio" name="q${i}" value="${decode(q[5])}"><span>${q[2]}</span></label>
                <label><input type="radio" name="q${i}" value="${decode(q[6])}"><span>${q[3]}</span></label>
            </div>`;
            c.appendChild(d);
        });
    }

    window.generateReport = function() {
        const rs = document.querySelectorAll('input[type="radio"]:checked');
        if(rs.length < 30) { alert("测评尚未完成"); return; }
        let s = { linguistic:0, logical:0, spatial:0, musical:0, kinesthetic:0, interpersonal:0 };
        rs.forEach(r => s[r.value]++);
        
        const dict = {
            linguistic: ["语言天才", "具备出色的语境迁移与叙事潜质。", "多读绘本，鼓励自主续编故事。"],
            logical: ["逻辑思想者", "对因果关系与秩序规则高度敏感。", "引入编程启蒙与数学逻辑游戏。"],
            spatial: ["空间建模师", "视觉渲染与空间还原能力极佳。", "提供复杂拼插玩具与绘画训练。"],
            musical: ["乐感敏感期", "具备极佳的节奏感知与音准潜力。", "接触乐器，通过律动感受古典乐。"],
            kinesthetic: ["运动协作者", "手脑配合与身体控制精准度高。", "开展平衡车运动与精细手工。"],
            interpersonal: ["社交洞察者", "具备共情能力与潜在领袖气质。", "参加群体合作，练习换位思考。"]
        };

        const top = Object.keys(s).sort((a,b) => s[b]-s[a])[0];
        document.getElementById('res-title').innerText = dict[top][0];
        document.getElementById('res-desc').innerText = dict[top][1];
        document.getElementById('res-advice').innerText = dict[top][2];

        const labels = ['语言', '逻辑', '空间', '音乐', '运动', '社交'];
        const values = [s.linguistic, s.logical, s.spatial, s.musical, s.kinesthetic, s.interpersonal];

        if(charts.r) charts.r.destroy();
        if(charts.b) charts.b.destroy();

        charts.r = new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: { labels: labels, datasets: [{ data: values, backgroundColor: 'rgba(255, 118, 117, 0.2)', borderColor: '#FF7675', borderWidth: 3 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });

        charts.b = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ data: values, backgroundColor: ['#FF7675', '#74B9FF', '#55E6C1', '#FDCB6E', '#A29BFE', '#FAB1A0'], borderRadius: 10 }] },
            options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
        });

        document.getElementById('report').style.display = 'block';
        setTimeout(() => window.scrollTo({ top: document.getElementById('report').offsetTop - 30, behavior: 'smooth' }), 100);
    }
    let charts = {};
})();
</script>
</body>
</html>
