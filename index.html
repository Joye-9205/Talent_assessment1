<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>3-4岁幼儿潜力深度测评</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #FF7675;
            --secondary: #74B9FF;
            --glass-white: rgba(255, 255, 255, 0.75);
            --bg-gradient: linear-gradient(135deg, #FFF0F0 0%, #F0F7FF 100%);
            --text-main: #2D3436;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: "PingFang SC", "STHeiti", sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0; padding: 12px; color: var(--text-main); line-height: 1.5;
        }

        /* 授权遮罩 */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 118, 117, 0.35); backdrop-filter: blur(25px);
            z-index: 99999; display: flex; align-items: center; justify-content: center;
        }
        .auth-box {
            background: rgba(255, 255, 255, 0.92); padding: 45px 30px; border-radius: 40px;
            width: 88%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12); border: 1px solid rgba(255,255,255,0.6);
        }
        .auth-box h2 { color: var(--primary); font-size: 24px; margin-bottom: 10px; }
        .auth-box input {
            width: 100%; padding: 18px; border: 2px solid #F0F0F0; border-radius: 20px;
            margin: 25px 0; font-size: 24px; text-align: center; outline: none; background: white; letter-spacing: 4px;
        }
        .auth-box button {
            width: 100%; padding: 18px; background: var(--primary); color: white;
            border: none; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,118,117,0.2);
        }

        /* 主容器 */
        #main-content {
            display: none; max-width: 600px; margin: auto;
            background: var(--glass-white); backdrop-filter: blur(20px);
            padding: 24px 18px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        header { text-align: center; margin-bottom: 35px; }
        h1 { color: var(--primary); font-size: 26px; margin: 0; letter-spacing: -0.5px; }
        .badge { display: inline-block; padding: 4px 14px; background: rgba(255,118,117,0.12); color: var(--primary); border-radius: 10px; font-size: 12px; margin-top: 10px; font-weight: 700; }

        /* 题目卡片 */
        .question {
            margin-bottom: 22px; padding: 22px; border-radius: 28px;
            background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
        }
        .question p { font-weight: 700; margin-bottom: 18px; font-size: 17px; color: #333; line-height: 1.4; }
        .options label {
            display: block; margin: 12px 0; padding: 15px 20px;
            border: 1.5px solid #F0F0F0; border-radius: 18px;
            font-size: 15px; cursor: pointer; background: white; transition: all 0.25s ease;
        }
        input[type="radio"] { display: none; }
        .options label:has(input:checked) { border-color: var(--primary); background: #FFF9F9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,118,117,0.1); }
        input[type="radio"]:checked + span { color: var(--primary); font-weight: 700; }

        .btn-submit {
            width: 100%; padding: 22px; background: linear-gradient(135deg, #FF7675, #FF8E8D);
            color: white; border: none; border-radius: 22px; font-size: 19px;
            font-weight: 800; cursor: pointer; margin-top: 25px;
            box-shadow: 0 12px 25px rgba(255,118,117,0.3);
        }

        /* 报告区域 */
        #report { display: none; margin-top: 45px; animation: fadeIn 0.8s ease; }
        .report-card { background: white; border-radius: 35px; padding: 28px; margin-bottom: 25px; border: 1px solid #F5F5F5; }
        .res-headline h2 { font-size: 30px; color: var(--primary); margin: 8px 0; text-align: center; font-weight: 900; }
        
        .radar-box { height: 450px; width: 100%; margin: 10px 0; position: relative; }

        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .level-card { 
            padding: 15px; border-radius: 20px; background: #FBFBFC; border: 1px solid #F0F0F0;
            display: flex; flex-direction: column; align-items: center;
        }
        .lvl-label { font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 500; }
        .lvl-val { font-size: 14px; font-weight: 800; padding: 4px 12px; border-radius: 10px; }
        .best { background: #E6FFF1; color: #00B894; }
        .good { background: #E8F4FF; color: #0984E3; }
        .norm { background: #F5F6F7; color: #A0AEC0; }

        .analysis-text { color: #505050; font-size: 15px; line-height: 1.85; text-align: justify; white-space: pre-line; }
        .advice-item { background: #F9FCFF; padding: 18px; border-radius: 20px; margin-bottom: 12px; font-size: 14px; border-left: 5px solid var(--secondary); color: #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<div id="auth-overlay">

            <p style="font-weight:900; font-size:18px; margin-top:0; color:#333;">多维潜力图谱</p>
            <div class="radar-box"><canvas id="radarChart"></canvas></div>
        </div>

        <div class="report-card">
            <p style="font-weight:900; font-size:18px; margin-top:0; color:#333;">天赋等级清单</p>

        </div>

        <div class="report-card">
            <p style="font-weight:900; font-size:18px; margin-top:0; color:#333;">深度潜能解读</p>
            <div id="res-desc" class="analysis-text"></div>
        </div>

        <div class="report-card">
            <p style="font-weight:900; font-size:18px; margin-top:0; color:#333;">定制培养方案</p>
            <div id="res-advice"></div>

    </div>
</div>

    window.generateReport = function() {
        const sel = document.querySelectorAll('input[type="radio"]:checked');
        if(sel.length < 40) { alert(`测评还差 ${40-sel.length} 题。请全部完成后再查看报告。`); return; }
        
        let s = { linguistic:0, logical:0, spatial:0, musical:0, kinesthetic:0, interpersonal:0 };
        sel.forEach(r => s[r.value]++);
        
        const sorted = Object.keys(s).sort((a,b) => s[b]-s[a]);
        const res = dict[sorted[0]];

        document.getElementById('res-title').innerText = res.title;
        document.getElementById('res-desc').innerText = res.desc;
        document.getElementById('res-tags').innerHTML = res.tags.map(t => `<span class="badge" style="margin:4px;">${t}</span>`).join('');
        document.getElementById('res-advice').innerHTML = res.advice.map(a => `<div class="advice-item">${a}</div>`).join('');

        renderLevels(s);
        renderRadar(s);

        document.getElementById('report').style.display = 'block';
        window.scrollTo({ top: document.getElementById('report').offsetTop - 30, behavior: 'smooth' });
    };

    function renderLevels(s) {
        const names = { linguistic:'语言表达', logical:'数理逻辑', spatial:'空间视觉', musical:'音乐律动', kinesthetic:'肢体运动', interpersonal:'人际社交' };
        const container = document.getElementById('level-list');
        container.innerHTML = '';
        Object.keys(s).forEach(k => {
            const v = s[k];
            let lvl = 'norm', txt = '基础水平';
            if(v >= 10) { lvl = 'best'; txt = '天赋极佳'; }
            else if(v >= 6) { lvl = 'good'; txt = '潜力显著'; }
            container.innerHTML += `<div class="level-card"><span class="lvl-label">${names[k]}</span><span class="lvl-val ${lvl}">${txt}</span></div>`;
        });
    }

    function renderRadar(s) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        const labels = ['语言表达', '数理逻辑', '空间视觉', '音乐律动', '肢体运动', '人际社交'];
        const values = [s.linguistic, s.logical, s.spatial, s.musical, s.kinesthetic, s.interpersonal];
        const isSmall = window.innerWidth < 400;

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: 'rgba(255, 118, 117, 0.22)',
                    borderColor: '#FF7675',
                    borderWidth: 4,
                    pointBackgroundColor: '#FFF',
                    pointBorderColor: '#FF7675',
                    pointBorderWidth: 2,
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: isSmall ? 15 : 25 },
                scales: {
                    r: {
                        min: 0, max: 18,
                        beginAtZero: true,
                        ticks: { display: false, stepSize: 4 },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        angleLines: { color: 'rgba(0,0,0,0.05)' },
                        pointLabels: { 
                            font: { size: isSmall ? 13 : 15, weight: '700' },
                            color: '#444',
                            padding: 10
                        }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
})();
